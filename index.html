    <style>
      /* Loading screen styles */
      #app-loader {
        position: fixed;

        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #faf9f6;
        z-index: 99999;
        transition: opacity 0.3s ease;

      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e8e0d0;
        border-top-color: #2d7a5e;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

        font-size: 14px;
